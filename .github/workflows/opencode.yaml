name: OpenCode
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@cacaa8c32c2b969ea8f8d03c9f7557548b4eb0d6 # v0.0.52
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@cacaa8c32c2b969ea8f8d03c9f7557548b4eb0d6 # v0.0.52
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
