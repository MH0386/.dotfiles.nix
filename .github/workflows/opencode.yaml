name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
  push:
    branches: [main]
env:
  PROMPT: >-
    You are a helpful assistant for nix code generation and review.
    Review the following code and suggest improvements, optimizations, and best practices.
    Provide explanations for your suggestions.
    Create github issues for any significant problems you find, and link to relevant documentation or resources.
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode') ||
      github.event.pull_request ||
      github.event.pusher
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.0
        with:
          persist-credentials: false
      - name: Run opencode
        uses: anomalyco/opencode/github@v1.2.21
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_EXPERIMENTAL: true
          SUPERMEMORY_API_KEY: ${{ secrets.SUPERMEMORY_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          model: opencode/big-pickle
          share: true
          prompt: ${{ github.event.pusher && env.PROMPT || '' }}
          agent: Sisyphus
