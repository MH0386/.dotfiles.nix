name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@a9f70d8e5f15243c8c9994784e6f4e2a409c2d9a # v0.0.63
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@a9f70d8e5f15243c8c9994784e6f4e2a409c2d9a # v0.0.63
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
