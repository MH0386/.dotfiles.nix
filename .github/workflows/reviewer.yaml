name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@c12634e5f5572271ec10c17bcb613125653502e4 # v0.0.67
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@c12634e5f5572271ec10c17bcb613125653502e4 # v0.0.67
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
