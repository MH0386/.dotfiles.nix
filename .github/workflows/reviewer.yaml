name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@8a783ffb3f8f5e2afe073ea4b001d3dcc5897355 # v0.0.55
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@8a783ffb3f8f5e2afe073ea4b001d3dcc5897355 # v0.0.55
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
