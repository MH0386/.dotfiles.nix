name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@06e8bd9e7d2f3c64be28accdc763d17db2ee785c # v0.0.66
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@06e8bd9e7d2f3c64be28accdc763d17db2ee785c # v0.0.66
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
