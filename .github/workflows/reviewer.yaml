name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@21729a6d31f625f3a3c66d7fde2c54037e2cd67b # v0.0.53
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@21729a6d31f625f3a3c66d7fde2c54037e2cd67b # v0.0.53
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
