name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@b6eecd6675616d3bef4e3e1691c86567e927ce01 # v0.0.69
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@b6eecd6675616d3bef4e3e1691c86567e927ce01 # v0.0.69
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
