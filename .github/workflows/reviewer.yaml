name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@7d48d21008ee304929b842b7ca9062ba9a19ade3 # v0.0.68
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@7d48d21008ee304929b842b7ca9062ba9a19ade3 # v0.0.68
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
