name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@66323dac73e87756def8efd2866ef1d13ad389b3 # v0.0.58
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@66323dac73e87756def8efd2866ef1d13ad389b3 # v0.0.58
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
