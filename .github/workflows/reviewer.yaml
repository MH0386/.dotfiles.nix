name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@5b5eaaed542d438ab8856a4b3679be1eaf00d570 # v0.0.65
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@5b5eaaed542d438ab8856a4b3679be1eaf00d570 # v0.0.65
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
