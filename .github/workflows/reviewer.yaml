name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@39c58995984a6f9b23d6e7bf5d3ae772ddc8c0a7 # v0.0.57
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@39c58995984a6f9b23d6e7bf5d3ae772ddc8c0a7 # v0.0.57
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
