name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@d352a6d3872694f9ca4661cfbbe9592f09894cbf # v0.0.61
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@d352a6d3872694f9ca4661cfbbe9592f09894cbf # v0.0.61
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
