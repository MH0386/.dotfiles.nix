name: Reviewer
on:
  issue_comment:
  pull_request_review_comment:
jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Setup Env
        uses: AlphaSphereDotAI/helpr_action/ci/setup/devenv@0c2916658a67054d3bbdee793ae4c7f2213b3ae7 # v0.0.62
      - name: Run opencode
        uses: AlphaSphereDotAI/helpr_action/ci/tools/opencode@0c2916658a67054d3bbdee793ae4c7f2213b3ae7 # v0.0.62
        with:
          api_key: ${{ secrets.OPENCODE_API_KEY }}
